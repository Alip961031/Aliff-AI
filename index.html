<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliff – AI Assistant</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            max-width: 900px;
            width: 100%;
            height: 90vh;
            background: #1e293b;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-message, .assistant-message {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 24px;
            line-height: 1.4;
            word-break: break-word;
        }

        .user-message {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
        }

        .assistant-message {
            align-self: flex-start;
            background: #334155;
        }

        .attachment-badge {
            font-size: 11px;
            margin-top: 6px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-area {
            padding: 16px;
            background: #0f172a;
            border-top: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .file-label {
            background: #334155;
            padding: 8px 16px;
            border-radius: 28px;
            cursor: pointer;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.1s;
        }

        .file-label:hover {
            background: #475569;
        }

        .file-preview {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .upload-preview {
            font-size: 12px;
            background: #1e293b;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 28px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border 0.1s;
        }

        textarea:focus {
            border-color: #3b82f6;
        }

        button {
            background: #3b82f6;
            border: none;
            padding: 12px 24px;
            border-radius: 28px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.1s;
        }

        button:hover {
            background: #2563eb;
        }

        .session-info {
            padding: 8px 16px;
            background: #0f172a;
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid #334155;
        }

        .new-session {
            background: #334155;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            color: #e2e8f0;
        }

        .new-session:hover {
            background: #475569;
        }

        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #334155;
            padding: 10px 16px;
            border-radius: 24px;
            align-self: flex-start;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-3px); }
        }

        a {
            color: #3b82f6;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .setup-note {
            background: #0f172a;
            padding: 12px;
            text-align: center;
            font-size: 11px;
            color: #64748b;
            border-top: 1px solid #334155;
        }

        .setup-note code {
            background: #1e293b;
            padding: 2px 6px;
            border-radius: 8px;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <div class="file-row">
            <label class="file-label" id="attachLabel">
                <input type="file" id="fileInput" style="display:none" multiple>
                📎 Attach files
            </label>
            <div id="filePreview" class="file-preview"></div>
        </div>
        <div class="input-row">
            <textarea id="messageInput" rows="1" placeholder="Ask Aliff anything... (Shift+Enter for new line)"></textarea>
            <button id="sendBtn">Send</button>
        </div>
    </div>
    <div class="session-info">
        <span>Session: <span id="sessionId"></span></span>
        <button class="new-session" id="newSessionBtn">New conversation</button>
        <span><label><input type="checkbox" id="streamToggle" checked> Stream response</label></span>
    </div>
    <div class="setup-note">
        ⚙️ Backend: <code id="workerUrlDisplay">https://your-worker-name.workers.dev</code> – edit in JavaScript below
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURATION – CHANGE THIS TO YOUR CLOUDFLARE WORKER URL
    // ============================================================
    const WORKER_URL = "https://your-worker-name.workers.dev";   // <-- REPLACE THIS

    // Display the URL for reference
    document.getElementById('workerUrlDisplay').innerText = WORKER_URL;

    // Session management
    let sessionId = localStorage.getItem('aliff_session_id');
    if (!sessionId) {
        sessionId = crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36);
        localStorage.setItem('aliff_session_id', sessionId);
    }
    document.getElementById('sessionId').innerText = sessionId;

    let attachedFiles = [];

    // DOM elements
    const messagesDiv = document.getElementById('messages');
    const fileInput = document.getElementById('fileInput');
    const filePreviewDiv = document.getElementById('filePreview');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const streamToggle = document.getElementById('streamToggle');
    const newSessionBtn = document.getElementById('newSessionBtn');

    // Helper: update file preview
    function updateFilePreview() {
        filePreviewDiv.innerHTML = attachedFiles.map((f, idx) => `
            <div class="upload-preview">
                ${escapeHtml(f.name)} (${(f.size/1024).toFixed(0)} KB)
                <span style="cursor:pointer; margin-left:6px;" onclick="removeFile(${idx})">❌</span>
            </div>
        `).join('');
    }

    window.removeFile = (idx) => {
        attachedFiles.splice(idx, 1);
        updateFilePreview();
    };

    fileInput.addEventListener('change', (e) => {
        attachedFiles.push(...Array.from(e.target.files));
        updateFilePreview();
        fileInput.value = '';
    });

    // Helper: escape HTML to prevent injection
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Add a message to the UI
    function addMessage(text, sender, meta = {}) {
        const msgDiv = document.createElement('div');
        msgDiv.className = sender === 'user' ? 'user-message' : 'assistant-message';
        msgDiv.textContent = text || '(empty)';
        if (meta.attachments && meta.attachments.length) {
            const attachSpan = document.createElement('div');
            attachSpan.className = 'attachment-badge';
            attachSpan.innerHTML = '📎 ' + meta.attachments.map(a => escapeHtml(a.name)).join(', ');
            msgDiv.appendChild(attachSpan);
        }
        messagesDiv.appendChild(msgDiv);
        scrollToBottom();
        return msgDiv;
    }

    // Show typing indicator
    let typingDiv = null;
    function showTyping() {
        if (typingDiv) return typingDiv;
        typingDiv = document.createElement('div');
        typingDiv.className = 'typing-indicator';
        typingDiv.innerHTML = '<span></span><span></span><span></span>';
        messagesDiv.appendChild(typingDiv);
        scrollToBottom();
        return typingDiv;
    }

    function hideTyping() {
        if (typingDiv) {
            typingDiv.remove();
            typingDiv = null;
        }
    }

    function scrollToBottom() {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Send message with optional attachments
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text && attachedFiles.length === 0) return;

        // Show user message immediately
        addMessage(text || '(attachment only)', 'user', { attachments: attachedFiles.map(f => ({ name: f.name, size: f.size })) });
        messageInput.value = '';
        messageInput.style.height = 'auto';

        showTyping();

        // Upload files first
        let uploadedKeys = [];
        for (const file of attachedFiles) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('sessionId', sessionId);
            try {
                const uploadRes = await fetch(WORKER_URL + '/upload', { method: 'POST', body: formData });
                const uploadData = await uploadRes.json();
                if (uploadData.ok) uploadedKeys.push(uploadData.key);
                else console.warn('Upload failed for', file.name, uploadData);
            } catch (err) {
                console.error('Upload error', err);
                addMessage(`Failed to upload ${file.name}.`, 'assistant');
            }
        }
        attachedFiles = [];
        updateFilePreview();

        const streamEnabled = streamToggle.checked;
        const chatBody = { message: text, sessionId, attachments: uploadedKeys, stream: streamEnabled };

        try {
            if (streamEnabled) {
                const response = await fetch(WORKER_URL + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(chatBody)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantDiv = null;
                let assistantText = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') {
                                hideTyping();
                                break;
                            }
                            try {
                                const parsed = JSON.parse(data);
                                const token = parsed.token || '';
                                if (token) {
                                    assistantText += token;
                                    if (!assistantDiv) {
                                        assistantDiv = addMessage(assistantText, 'assistant');
                                    } else {
                                        assistantDiv.querySelector('.assistant-message').textContent = assistantText;
                                    }
                                    scrollToBottom();
                                }
                            } catch (e) { /* ignore partial JSON */ }
                        }
                    }
                }
                hideTyping();
            } else {
                const response = await fetch(WORKER_URL + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(chatBody)
                });
                const data = await response.json();
                hideTyping();
                if (data.reply) {
                    addMessage(data.reply, 'assistant');
                } else {
                    addMessage('Error: ' + (data.error || 'Unknown response'), 'assistant');
                }
            }
        } catch (err) {
            console.error(err);
            hideTyping();
            addMessage('Network error. Please check if the worker URL is correct and the worker is deployed.', 'assistant');
        }
    }

    // Load conversation history on page load
    async function loadHistory() {
        try {
            const res = await fetch(WORKER_URL + `/history?sessionId=${sessionId}`);
            if (!res.ok) return;
            const data = await res.json();
            if (data.history && data.history.length) {
                messagesDiv.innerHTML = '';
                for (const msg of data.history) {
                    addMessage(msg.content, msg.role, { attachments: msg.attachments || [] });
                }
                scrollToBottom();
            }
        } catch (err) {
            console.warn('Could not load history', err);
        }
    }

    // Event listeners
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    messageInput.addEventListener('input', () => {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
    });
    newSessionBtn.addEventListener('click', () => {
        localStorage.removeItem('aliff_session_id');
        location.reload();
    });

    // Load history after page is ready
    loadHistory();
</script>
</body>
</html>
