<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Aliff AI Assistant</title>

  <style>
    :root {
      --bg: #020617;
      --panel: #0f172a;
      --panel-2: #1e293b;
      --panel-3: #334155;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --danger: #ef4444;
      --success: #22c55e;
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.12), transparent 34%),
        var(--bg);
    }

    .app {
      width: min(100%, 960px);
      height: min(100dvh, 920px);
      display: flex;
      flex-direction: column;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    @media (min-width: 760px) {
      body {
        padding: 18px;
      }

      .app {
        height: 92dvh;
        border-radius: 28px;
      }
    }

    .topbar {
      flex: 0 0 auto;
      min-height: 68px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.98);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      display: grid;
      place-items: center;
      font-size: 21px;
      flex: 0 0 auto;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-title {
      font-weight: 800;
      font-size: 17px;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-subtitle {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .small-btn {
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 11px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 650;
    }

    .small-btn:hover {
      background: var(--panel-3);
    }

    .messages {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 8px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 999px;
    }

    .welcome {
      margin: auto;
      width: min(100%, 640px);
      text-align: center;
      padding: 24px 12px;
      color: var(--muted);
    }

    .welcome .emoji {
      font-size: 42px;
      margin-bottom: 12px;
    }

    .welcome h1 {
      margin: 0 0 8px;
      color: var(--text);
      font-size: clamp(24px, 4vw, 34px);
      letter-spacing: -0.04em;
    }

    .welcome p {
      margin: 0 auto 18px;
      line-height: 1.55;
      max-width: 520px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    @media (max-width: 600px) {
      .quick-grid {
        grid-template-columns: 1fr;
      }
    }

    .quick-btn {
      text-align: left;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(30, 41, 59, 0.88);
      color: #cbd5e1;
      border-radius: 16px;
      padding: 12px;
      cursor: pointer;
      line-height: 1.35;
    }

    .quick-btn:hover {
      background: #334155;
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeIn 0.15s ease-out;
    }

    .msg.user {
      justify-content: flex-end;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--panel-3);
      flex: 0 0 auto;
    }

    .msg.user .avatar {
      order: 2;
      background: linear-gradient(135deg, #2563eb, #38bdf8);
    }

    .bubble-wrap {
      max-width: min(760px, 82%);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    @media (max-width: 600px) {
      .bubble-wrap {
        max-width: 88%;
      }

      .avatar {
        display: none;
      }
    }

    .bubble {
      padding: 12px 15px;
      border-radius: 20px;
      line-height: 1.55;
      font-size: 15px;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #fff;
      border-top-right-radius: 7px;
    }

    .msg.assistant .bubble {
      background: rgba(30, 41, 59, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-top-left-radius: 7px;
    }

    .meta {
      display: flex;
      gap: 9px;
      color: var(--muted);
      font-size: 11px;
      padding: 0 4px;
    }

    .msg.user .meta {
      justify-content: flex-end;
    }

    .copy-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      font-size: 11px;
    }

    .copy-btn:hover {
      color: var(--text);
    }

    .assistant-content p {
      margin: 7px 0;
    }

    .assistant-content ul,
    .assistant-content ol {
      margin: 8px 0 8px 22px;
      padding: 0;
    }

    .assistant-content li {
      margin: 4px 0;
    }

    .assistant-content h1,
    .assistant-content h2,
    .assistant-content h3 {
      margin: 10px 0 6px;
      line-height: 1.25;
    }

    .assistant-content h1 {
      font-size: 22px;
    }

    .assistant-content h2 {
      font-size: 19px;
    }

    .assistant-content h3 {
      font-size: 17px;
    }

    .assistant-content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.92em;
      background: rgba(2, 6, 23, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.14);
      padding: 2px 5px;
      border-radius: 7px;
    }

    .assistant-content pre {
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 14px;
      padding: 12px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .assistant-content pre code {
      background: transparent;
      border: none;
      padding: 0;
    }

    .attachment-list {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .attachment-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(15, 23, 42, 0.32);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
    }

    .typing {
      width: fit-content;
      display: inline-flex;
      gap: 5px;
      padding: 12px 15px;
      background: rgba(30, 41, 59, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 20px;
      border-top-left-radius: 7px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--muted);
      animation: pulse 1.2s infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.3s;
    }

    .composer {
      flex: 0 0 auto;
      border-top: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.98);
      padding: 12px;
    }

    .file-preview {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      max-height: 82px;
      overflow-y: auto;
    }

    .file-preview.active {
      display: flex;
    }

    .file-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--panel-2);
      border: 1px solid rgba(148, 163, 184, 0.18);
      color: #cbd5e1;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      max-width: 100%;
    }

    .file-pill span.name {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-remove {
      color: #fecaca;
      font-weight: 900;
      cursor: pointer;
      padding: 0 2px;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--panel-2);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 22px;
      padding: 8px;
    }

    .attach-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 15px;
      background: var(--panel-3);
      color: white;
      cursor: pointer;
      font-size: 18px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
    }

    .attach-btn:hover {
      background: #475569;
    }

    textarea {
      flex: 1 1 auto;
      width: 100%;
      min-height: 42px;
      max-height: 150px;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font: inherit;
      font-size: 15px;
      line-height: 1.45;
      padding: 10px 4px;
    }

    textarea::placeholder {
      color: #64748b;
    }

    .send-btn {
      height: 42px;
      min-width: 82px;
      border: none;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: white;
      font-weight: 800;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .send-btn:hover {
      filter: brightness(1.08);
    }

    .send-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .composer-bottom {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 11px;
      margin-top: 7px;
      padding: 0 4px;
    }

    .toggles {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .check-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
    }

    .session {
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .topbar {
        padding: 12px;
      }

      .small-btn {
        padding: 7px 9px;
        font-size: 12px;
      }

      .messages {
        padding: 14px 12px;
      }

      .composer {
        padding: 10px;
      }

      .send-btn {
        min-width: 48px;
        font-size: 0;
      }

      .send-btn::after {
        content: "➤";
        font-size: 16px;
      }

      .composer-bottom {
        flex-direction: column;
        gap: 5px;
      }

      .session {
        max-width: 100%;
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.35;
        transform: translateY(0);
      }
      50% {
        opacity: 1;
        transform: translateY(-3px);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🤖</div>
        <div class="brand-text">
          <div class="brand-title">Aliff AI Assistant</div>
          <div class="brand-subtitle">Context-aware chat with memory</div>
        </div>
      </div>

      <div class="top-actions">
        <button class="small-btn" id="reloadBtn">Reload</button>
        <button class="small-btn" id="newBtn">New</button>
      </div>
    </header>

    <main class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="emoji">✨</div>
        <h1>Hi Aliff</h1>
        <p>
          Ask anything. I’ll keep track of the conversation in this session and reply in a clean, easy-to-read way.
        </p>

        <div class="quick-grid">
          <button class="quick-btn">Help me improve this customer reply</button>
          <button class="quick-btn">Debug my JavaScript code</button>
          <button class="quick-btn">Summarize this into bullet points</button>
          <button class="quick-btn">Continue from our previous message</button>
        </div>
      </div>
    </main>

    <footer class="composer">
      <div class="file-preview" id="filePreview"></div>

      <div class="input-row">
        <button class="attach-btn" id="attachBtn" type="button" title="Attach files">📎</button>
        <input type="file" id="fileInput" multiple hidden />

        <textarea
          id="messageInput"
          rows="1"
          placeholder="Message Aliff AI..."
        ></textarea>

        <button class="send-btn" id="sendBtn" type="button">Send</button>
      </div>

      <div class="composer-bottom">
        <div class="toggles">
          <label class="check-label">
            <input type="checkbox" id="streamToggle" checked />
            Stream
          </label>

          <label class="check-label">
            <input type="checkbox" id="searchToggle" />
            Search
          </label>

          <span id="fileCount">No files</span>
        </div>

        <div class="session">
          Session: <span id="sessionId"></span>
        </div>
      </div>
    </footer>
  </div>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================
    const WORKER_URL = "https://aliff-ai.kgurun88.workers.dev";

    // ============================================================
    // STATE
    // ============================================================
    let sessionId = localStorage.getItem("aliff_session_id");

    if (!sessionId) {
      sessionId = crypto.randomUUID
        ? crypto.randomUUID()
        : Date.now() + "-" + Math.random().toString(36).slice(2);

      localStorage.setItem("aliff_session_id", sessionId);
    }

    let attachedFiles = [];
    let isSending = false;
    let typingRow = null;

    // ============================================================
    // ELEMENTS
    // ============================================================
    const messages = document.getElementById("messages");
    const welcome = document.getElementById("welcome");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const attachBtn = document.getElementById("attachBtn");
    const fileInput = document.getElementById("fileInput");
    const filePreview = document.getElementById("filePreview");
    const fileCount = document.getElementById("fileCount");
    const sessionIdEl = document.getElementById("sessionId");
    const streamToggle = document.getElementById("streamToggle");
    const searchToggle = document.getElementById("searchToggle");
    const reloadBtn = document.getElementById("reloadBtn");
    const newBtn = document.getElementById("newBtn");

    sessionIdEl.textContent = sessionId;

    // ============================================================
    // HELPERS
    // ============================================================
    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, m => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[m]));
    }

    function formatFileSize(bytes) {
      if (!bytes) return "0 KB";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + " KB";
      return (bytes / 1024 / 1024).toFixed(1) + " MB";
    }

    function timeNow() {
      return new Date().toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function scrollBottom(smooth = true) {
      messages.scrollTo({
        top: messages.scrollHeight,
        behavior: smooth ? "smooth" : "auto"
      });
    }

    function updateSession(newSessionId) {
      if (!newSessionId) return;
      sessionId = newSessionId;
      localStorage.setItem("aliff_session_id", sessionId);
      sessionIdEl.textContent = sessionId;
    }

    function hideWelcome() {
      welcome.style.display = "none";
    }

    function checkWelcome() {
      const hasMessages = messages.querySelector(".msg");
      welcome.style.display = hasMessages ? "none" : "block";
    }

    function setSending(value) {
      isSending = value;
      sendBtn.disabled = value;
      sendBtn.textContent = value ? "..." : "Send";
    }

    function resizeInput() {
      messageInput.style.height = "auto";
      messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + "px";
    }

    // Simple safe markdown renderer
    function markdownToHtml(text) {
      let html = escapeHtml(text || "");

      html = html.replace(/```([\s\S]*?)```/g, function (_, code) {
        return "<pre><code>" + code.trim() + "</code></pre>";
      });

      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/^### (.*)$/gm, "<h3>$1</h3>");
      html = html.replace(/^## (.*)$/gm, "<h2>$1</h2>");
      html = html.replace(/^# (.*)$/gm, "<h1>$1</h1>");
      html = html.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

      const lines = html.split("\n");
      let output = "";
      let inUl = false;
      let inOl = false;

      for (const line of lines) {
        if (/^\s*[-*]\s+/.test(line)) {
          if (!inUl) {
            output += "<ul>";
            inUl = true;
          }
          output += "<li>" + line.replace(/^\s*[-*]\s+/, "") + "</li>";
          continue;
        }

        if (/^\s*\d+\.\s+/.test(line)) {
          if (!inOl) {
            output += "<ol>";
            inOl = true;
          }
          output += "<li>" + line.replace(/^\s*\d+\.\s+/, "") + "</li>";
          continue;
        }

        if (inUl) {
          output += "</ul>";
          inUl = false;
        }

        if (inOl) {
          output += "</ol>";
          inOl = false;
        }

        if (!line.trim()) {
          output += "<br>";
        } else if (
          line.startsWith("<h1>") ||
          line.startsWith("<h2>") ||
          line.startsWith("<h3>") ||
          line.startsWith("<pre>")
        ) {
          output += line;
        } else {
          output += "<p>" + line + "</p>";
        }
      }

      if (inUl) output += "</ul>";
      if (inOl) output += "</ol>";

      return output;
    }

    // ============================================================
    // MESSAGES
    // ============================================================
    function addMessage(text, sender, attachments = []) {
      hideWelcome();

      const row = document.createElement("div");
      row.className = "msg " + sender;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = sender === "user" ? "👤" : "🤖";

      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (sender === "assistant") {
        const content = document.createElement("div");
        content.className = "assistant-content";
        content.innerHTML = markdownToHtml(text || "");
        bubble.appendChild(content);
      } else {
        bubble.textContent = text || "(empty)";
      }

      if (attachments.length) {
        const list = document.createElement("div");
        list.className = "attachment-list";

        list.innerHTML = attachments.map(a => {
          const name = typeof a === "string" ? a : a.name;
          return `<span class="attachment-chip">📎 ${escapeHtml(name)}</span>`;
        }).join("");

        bubble.appendChild(list);
      }

      const meta = document.createElement("div");
      meta.className = "meta";

      const time = document.createElement("span");
      time.textContent = timeNow();
      meta.appendChild(time);

      if (sender === "assistant") {
        const copy = document.createElement("button");
        copy.className = "copy-btn";
        copy.textContent = "Copy";
        copy.onclick = async () => {
          try {
            await navigator.clipboard.writeText(text || "");
            copy.textContent = "Copied";
            setTimeout(() => copy.textContent = "Copy", 1200);
          } catch (_) {
            copy.textContent = "Failed";
            setTimeout(() => copy.textContent = "Copy", 1200);
          }
        };
        meta.appendChild(copy);
      }

      wrap.appendChild(bubble);
      wrap.appendChild(meta);

      row.appendChild(avatar);
      row.appendChild(wrap);

      messages.appendChild(row);
      scrollBottom();

      return bubble;
    }

    function updateAssistantBubble(bubble, text) {
      bubble.innerHTML = "";

      const content = document.createElement("div");
      content.className = "assistant-content";
      content.innerHTML = markdownToHtml(text || "");

      bubble.appendChild(content);
      scrollBottom(false);
    }

    function showTyping() {
      if (typingRow) return;

      hideWelcome();

      typingRow = document.createElement("div");
      typingRow.className = "msg assistant";
      typingRow.id = "typingRow";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = "🤖";

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.innerHTML = "<span></span><span></span><span></span>";

      typingRow.appendChild(avatar);
      typingRow.appendChild(typing);

      messages.appendChild(typingRow);
      scrollBottom();
    }

    function hideTyping() {
      if (typingRow) {
        typingRow.remove();
        typingRow = null;
      }

      checkWelcome();
    }

    // ============================================================
    // FILES
    // ============================================================
    attachBtn.addEventListener("click", () => {
      fileInput.click();
    });

    fileInput.addEventListener("change", e => {
      attachedFiles.push(...Array.from(e.target.files || []));
      fileInput.value = "";
      renderFiles();
    });

    function renderFiles() {
      if (!attachedFiles.length) {
        filePreview.classList.remove("active");
        filePreview.innerHTML = "";
        fileCount.textContent = "No files";
        return;
      }

      filePreview.classList.add("active");
      fileCount.textContent = attachedFiles.length + " file(s)";

      filePreview.innerHTML = attachedFiles.map((file, index) => `
        <div class="file-pill">
          <span>📎</span>
          <span class="name">${escapeHtml(file.name)}</span>
          <span>${formatFileSize(file.size)}</span>
          <span class="file-remove" onclick="removeFile(${index})">×</span>
        </div>
      `).join("");
    }

    window.removeFile = function (index) {
      attachedFiles.splice(index, 1);
      renderFiles();
    };

    async function uploadFiles() {
      const uploadedKeys = [];

      for (const file of attachedFiles) {
        const fd = new FormData();
        fd.append("file", file);
        fd.append("sessionId", sessionId);

        try {
          const res = await fetch(`${WORKER_URL}/upload`, {
            method: "POST",
            body: fd
          });

          const data = await res.json().catch(() => ({}));

          if (data.sessionId) updateSession(data.sessionId);
          if (data.ok && data.key) uploadedKeys.push(data.key);
        } catch (err) {
          console.warn("Upload failed:", file.name, err);
        }
      }

      return uploadedKeys;
    }

    // ============================================================
    // HISTORY
    // ============================================================
    async function loadHistory() {
      try {
        const res = await fetch(`${WORKER_URL}/history?sessionId=${encodeURIComponent(sessionId)}`, {
          headers: {
            "X-Session-Id": sessionId
          }
        });

        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();

        if (data.sessionId) updateSession(data.sessionId);

        messages.querySelectorAll(".msg").forEach(el => el.remove());

        const history = data.history || [];

        for (const item of history) {
          addMessage(
            item.content,
            item.role === "user" ? "user" : "assistant",
            item.attachments || []
          );
        }

        checkWelcome();
        scrollBottom(false);
      } catch (err) {
        console.error("History failed:", err);
        checkWelcome();
      }
    }

    // ============================================================
    // SEND
    // ============================================================
    async function sendMessage() {
      if (isSending) return;

      const text = messageInput.value.trim();

      if (!text && attachedFiles.length === 0) return;

      const displayFiles = attachedFiles.map(f => ({
        name: f.name,
        size: f.size
      }));

      addMessage(text || "(attachment only)", "user", displayFiles);

      messageInput.value = "";
      resizeInput();

      setSending(true);
      showTyping();

      const uploadedKeys = await uploadFiles();

      attachedFiles = [];
      renderFiles();

      const payload = {
        message: text,
        sessionId,
        attachments: uploadedKeys,
        stream: streamToggle.checked,
        systemPrompt: "",
        useInternetSearch: searchToggle.checked
      };

      try {
        if (payload.stream) {
          await sendStreaming(payload);
        } else {
          await sendNormal(payload);
        }
      } catch (err) {
        hideTyping();
        addMessage("⚠️ Network error: " + err.message, "assistant");
        console.error(err);
      } finally {
        setSending(false);
        messageInput.focus();
      }
    }

    async function sendNormal(payload) {
      const res = await fetch(`${WORKER_URL}/chat`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Session-Id": sessionId
        },
        body: JSON.stringify(payload)
      });

      const headerSession = res.headers.get("X-Session-Id");
      if (headerSession) updateSession(headerSession);

      const data = await res.json().catch(() => ({}));
      if (data.sessionId) updateSession(data.sessionId);

      hideTyping();

      if (!res.ok) {
        addMessage("⚠️ " + (data.error || data.detail || "Something went wrong."), "assistant");
        return;
      }

      addMessage(data.reply || "No response.", "assistant");
    }

    async function sendStreaming(payload) {
      const res = await fetch(`${WORKER_URL}/chat`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Session-Id": sessionId
        },
        body: JSON.stringify(payload)
      });

      const headerSession = res.headers.get("X-Session-Id");
      if (headerSession) updateSession(headerSession);

      if (!res.ok || !res.body) {
        let errText = "Something went wrong.";

        try {
          const data = await res.json();
          errText = data.error || data.detail || errText;
        } catch (_) {}

        hideTyping();
        addMessage("⚠️ " + errText, "assistant");
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      let buffer = "";
      let fullText = "";
      let assistantBubble = null;

      while (true) {
        const { done, value } = await reader.read();

        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        const events = buffer.split("\n\n");
        buffer = events.pop() || "";

        for (const event of events) {
          const line = event
            .split("\n")
            .find(l => l.startsWith("data: "));

          if (!line) continue;

          const raw = line.slice(6).trim();

          if (!raw || raw === "[DONE]") continue;

          try {
            const parsed = JSON.parse(raw);

            if (parsed.sessionId) updateSession(parsed.sessionId);

            if (parsed.error) {
              hideTyping();
              addMessage("⚠️ " + parsed.error, "assistant");
              continue;
            }

            if (parsed.done) continue;

            const token = parsed.token || "";

            if (token) {
              fullText += token;

              if (!assistantBubble) {
                hideTyping();
                assistantBubble = addMessage("", "assistant");
              }

              updateAssistantBubble(assistantBubble, fullText);
            }
          } catch (err) {
            console.warn("Bad stream event:", raw);
          }
        }
      }

      hideTyping();

      if (!assistantBubble && fullText) {
        addMessage(fullText, "assistant");
      }

      if (!assistantBubble && !fullText) {
        addMessage("No response received.", "assistant");
      }
    }

    // ============================================================
    // EVENTS
    // ============================================================
    sendBtn.addEventListener("click", sendMessage);

    messageInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    messageInput.addEventListener("input", resizeInput);

    reloadBtn.addEventListener("click", loadHistory);

    newBtn.addEventListener("click", () => {
      localStorage.removeItem("aliff_session_id");

      sessionId = crypto.randomUUID
        ? crypto.randomUUID()
        : Date.now() + "-" + Math.random().toString(36).slice(2);

      localStorage.setItem("aliff_session_id", sessionId);
      sessionIdEl.textContent = sessionId;

      messages.querySelectorAll(".msg").forEach(el => el.remove());
      checkWelcome();

      messageInput.value = "";
      resizeInput();
      messageInput.focus();
    });

    document.querySelectorAll(".quick-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        messageInput.value = btn.textContent.trim();
        resizeInput();
        messageInput.focus();
      });
    });

    // ============================================================
    // INIT
    // ============================================================
    loadHistory();
    resizeInput();
    messageInput.focus();
  </script>
</body>
</html>
