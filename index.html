<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aliff – AI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .chat-container { max-width: 900px; width: 100%; height: 90vh; background: #1e293b; border-radius: 28px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 40px -12px rgba(0,0,0,0.4); }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .user-message, .assistant-message { max-width: 85%; padding: 10px 16px; border-radius: 24px; line-height: 1.4; word-break: break-word; font-size: 16px; }
    .user-message { align-self: flex-end; background: #3b82f6; color: white; }
    .assistant-message { align-self: flex-start; background: #334155; }
    .attachment-badge { font-size: 11px; margin-top: 6px; opacity: 0.8; display: flex; align-items: center; gap: 6px; }
    .input-area { padding: 16px; background: #0f172a; border-top: 1px solid #334155; }
    .file-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
    .file-label { background: #334155; padding: 6px 12px; border-radius: 28px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 8px; }
    .file-preview { display: flex; flex-wrap: wrap; gap: 8px; }
    .preview { background: #1e293b; padding: 4px 8px; border-radius: 20px; font-size: 11px; display: inline-flex; align-items: center; gap: 6px; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    textarea { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 28px; padding: 12px 16px; color: white; font-size: 15px; font-family: inherit; resize: none; outline: none; }
    button { background: #3b82f6; border: none; padding: 12px 24px; border-radius: 28px; color: white; font-weight: bold; cursor: pointer; }
    button:hover { background: #2563eb; }
    .session-info { padding: 8px 16px; background: #0f172a; font-size: 12px; color: #94a3b8; display: flex; justify-content: space-between; border-top: 1px solid #334155; }
    .typing-indicator { display: inline-flex; align-items: center; gap: 4px; background: #334155; padding: 10px 16px; border-radius: 24px; align-self: flex-start; }
    .typing-indicator span { width: 8px; height: 8px; background: #94a3b8; border-radius: 50%; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-3px); } }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div class="file-row">
      <label class="file-label"><input type="file" id="fileInput" style="display:none" multiple>📎 Attach files</label>
      <div id="filePreview" class="file-preview"></div>
    </div>
    <div class="input-row">
      <textarea id="messageInput" rows="1" placeholder="Ask Aliff anything... (Shift+Enter for new line)"></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>
  <div class="session-info">
    <span>Session: <span id="sessionId"></span></span>
    <button id="newSessionBtn" style="background:#334155; padding:4px 12px;">New conversation</button>
    <label><input type="checkbox" id="streamToggle" checked> Stream</label>
  </div>
</div>

<script>
  const WORKER_URL = "https://aliff-ai.kgurun88.workers.dev"; // CHANGE TO YOUR WORKER URL

  let sessionId = localStorage.getItem('aliff_session_id');
  if (!sessionId) {
    sessionId = crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36);
    localStorage.setItem('aliff_session_id', sessionId);
  }
  document.getElementById('sessionId').innerText = sessionId;

  const messagesDiv = document.getElementById('messages');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const streamToggle = document.getElementById('streamToggle');
  const newSessionBtn = document.getElementById('newSessionBtn');
  const fileInput = document.getElementById('fileInput');
  const filePreviewDiv = document.getElementById('filePreview');

  let attachedFiles = [];

  fileInput.onchange = (e) => {
    attachedFiles.push(...Array.from(e.target.files));
    updateFilePreview();
    fileInput.value = '';
  };
  function updateFilePreview() {
    filePreviewDiv.innerHTML = attachedFiles.map((f, idx) => `
      <div class="preview">
        ${escapeHtml(f.name)} (${(f.size/1024).toFixed(0)} KB)
        <span style="cursor:pointer" onclick="removeFile(${idx})">❌</span>
      </div>
    `).join('');
  }
  window.removeFile = (idx) => { attachedFiles.splice(idx,1); updateFilePreview(); };

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

  function addMessage(text, sender, attachments=[]) {
    const div = document.createElement('div');
    div.className = sender === 'user' ? 'user-message' : 'assistant-message';
    div.textContent = text || '(empty)';
    if (attachments.length) {
      const badge = document.createElement('div');
      badge.className = 'attachment-badge';
      badge.innerHTML = '📎 ' + attachments.map(a=>escapeHtml(a.name)).join(', ');
      div.appendChild(badge);
    }
    messagesDiv.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
    return div;
  }

  let typingDiv = null;
  function showTyping() { if (typingDiv) return; typingDiv = document.createElement('div'); typingDiv.className = 'typing-indicator'; typingDiv.innerHTML = '<span></span><span></span><span></span>'; messagesDiv.appendChild(typingDiv); typingDiv.scrollIntoView({ behavior: 'smooth' }); }
  function hideTyping() { if (typingDiv) { typingDiv.remove(); typingDiv = null; } }

  async function loadHistory() {
    try {
      const res = await fetch(`${WORKER_URL}/history?sessionId=${sessionId}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const history = data.history || [];
      messagesDiv.innerHTML = '';
      for (const msg of history) addMessage(msg.content, msg.role === 'user' ? 'user' : 'assistant', msg.attachments || []);
    } catch (err) { console.error(err); }
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text && attachedFiles.length === 0) return;
    addMessage(text || '(attachment only)', 'user', attachedFiles.map(f=>({name:f.name,size:f.size})));
    messageInput.value = ''; messageInput.style.height = 'auto';
    showTyping();

    let uploadedKeys = [];
    for (const file of attachedFiles) {
      const fd = new FormData(); fd.append('file', file); fd.append('sessionId', sessionId);
      try {
        const uploadRes = await fetch(`${WORKER_URL}/upload`, { method:'POST', body:fd });
        const uploadData = await uploadRes.json();
        if (uploadData.ok) uploadedKeys.push(uploadData.key);
      } catch(e) { console.warn('upload failed', file.name); }
    }
    attachedFiles = []; updateFilePreview();

    const payload = {
      message: text,
      sessionId,
      attachments: uploadedKeys,
      stream: streamToggle.checked,
      systemPrompt: "",   // optional – you can add a custom prompt
      useInternetSearch: false  // set to true if you have the search feature
    };

    try {
      if (payload.stream) {
        const response = await fetch(`${WORKER_URL}/chat`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let assistantDiv = null, fullText = '';
        while (true) {
          const { done, value } = await reader.read(); if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') break;
              try {
                const parsed = JSON.parse(data);
                const token = parsed.token || '';
                if (token) {
                  fullText += token;
                  if (!assistantDiv) assistantDiv = addMessage(fullText, 'assistant');
                  else { assistantDiv.textContent = fullText; assistantDiv.scrollIntoView({ behavior: 'smooth' }); }
                }
              } catch(e) {}
            }
          }
        }
        hideTyping();
      } else {
        const response = await fetch(`${WORKER_URL}/chat`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        const data = await response.json();
        hideTyping();
        addMessage(data.reply || 'Error', 'assistant');
      }
    } catch (err) { hideTyping(); addMessage(`Network error: ${err.message}`, 'assistant'); console.error(err); }
  }

  sendBtn.onclick = sendMessage;
  messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  messageInput.addEventListener('input', () => { messageInput.style.height = 'auto'; messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px'; });
  newSessionBtn.onclick = () => { localStorage.removeItem('aliff_session_id'); location.reload(); };
  loadHistory();
</script>
</body>
</html>
